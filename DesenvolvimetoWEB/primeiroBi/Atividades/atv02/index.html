<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina de cadastro </title>
</head>
<body>
    <h1>Página de cadastro</h1>
        <form action="#">
            <fieldset>
                <legend>Crie sua Conta</legend>

                <label for="nome">Nome:</label><br>
                <input type="text" id="nome" name="nome">
                <br><br>

                <label for="email">E-mail:</label><br>
                <input type="email" id="email" name="nome">
                <br><br>

                <label for="senha">Senha (mínimo 8 caracteres):</label><br>
                <input type="password" id="senha" name="senha">
                <br>

                <h2>Gênero:</h2>

                <input type="radio" name="feminio" id="feminio"> 
                <label for="feminio">Feminio</label>
                <br>

                <input type="radio" name="masculino" id="masculino"> 
                <label for="masculino">Maculino</label>
                <br>

                <input type="radio" name="outro" id="outro"> 
                <label for="outro">Outro</label>
                <br><br>

                <label for="biografia">Biografia:</label>
                <br>
                <textarea name="biografia" id="biografia" rows="6" placeholder="Fale um pouco sobre você..."></textarea>
                <br><br>

                <input type="checkbox" name="termos" id="termos">
                <label for="termos">Eu li aceito os termos de serviço</label>
            </fieldset>

            <br>
            <button>Cadastrar</button>
            <button type="reset">Limpar</button>
        </form>
</body>
</html>
